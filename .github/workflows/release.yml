name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer version (without leading v) for a manual dry-run; no Release will be created.'
        required: true
        default: '0.0.0-dryrun'

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            ext: '.exe'
          - rid: linux-x64
            os: ubuntu-latest
            ext: ''
          - rid: osx-arm64
            os: macos-latest
            ext: ''
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        shell: bash
        run: |
          dotnet publish SvdGenerator.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:Version=${{ steps.ver.outputs.value }} \
            -p:InformationalVersion=${{ steps.ver.outputs.value }} \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            -p:DebugType=embedded \
            -o out/${{ matrix.rid }}

      - name: Smoke-test the published binary
        shell: bash
        # Validate the freshly built single-file binary actually runs on its
        # native platform. Catches PublishSingleFile/trim/runtime breakage
        # that 'dotnet build' alone cannot see.
        env:
          SVD_DATA_REF: c65f8551e57c770344d229dcaa0bf838fa29aff4
          SVD_VENDOR: STMicro
          SVD_FILE: STM32F401.svd
        run: |
          set -euo pipefail
          BIN="out/${{ matrix.rid }}/SvdGenerator${{ matrix.ext }}"
          "$BIN" --version
          mkdir -p smoke_in smoke_out
          curl -fsSL \
            "https://raw.githubusercontent.com/cmsis-svd/cmsis-svd-data/${SVD_DATA_REF}/data/${SVD_VENDOR}/${SVD_FILE}" \
            -o "smoke_in/${SVD_FILE}"
          "$BIN" "smoke_in/${SVD_FILE}" smoke_out
          test -f smoke_out/interrupts.hpp
          test -f smoke_out/gpio.hpp

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "out/${{ matrix.rid }}/SvdGenerator${{ matrix.ext }}" \
             "dist/SvdGenerator-${{ steps.ver.outputs.value }}-${{ matrix.rid }}${{ matrix.ext }}"

      - uses: actions/upload-artifact@v7
        with:
          name: SvdGenerator-${{ matrix.rid }}
          path: dist/*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
